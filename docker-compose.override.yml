# Local Development Override - Adds Nginx API Gateway
# This file is automatically merged with docker-compose.yml
# Run: docker-compose up  (includes both files)

version: '3.8'

services:
  # Nginx API Gateway
  # Provides unified entry point for all microservices
  # Access at: http://localhost:8080
  # Routes:
  #   /auth/*        → auth-service:8000
  #   /los/*         → los-service:8000
  #   /lms/*         → lms-service:8000
  #   /collections/* → collections-service:8000
  #   ... (all 19 services)
  api-gateway:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
    container_name: nbfcsuite-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - los-service
      - lms-service
      - collections-service
      - customer-service
      - findna-service
      - deposits-service
      - accounting-service
      - crm-service
      - document-service
      - compliance-service
      - hrms-service
      - gold-service
      - treasury-service
      - wealth-service
      - insurance-service
      - procurement-service
      - platform-service
    networks:
      - nbfcsuite-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3


