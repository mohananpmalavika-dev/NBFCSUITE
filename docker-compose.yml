version: '3.8'

services:
  # Database
  postgres:
    image: postgres:15-alpine
    container_name: nbfcsuite-postgres
    environment:
      POSTGRES_USER: nbfc_user
      POSTGRES_PASSWORD: nbfc_pass
      POSTGRES_DB: nbfcsuite
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nbfc_user -d nbfcsuite"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nbfcsuite-network

  # Auth Service
  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: nbfcsuite-auth
    environment:
      DATABASE_URL: postgresql://nbfc_user:nbfc_pass@postgres:5432/nbfcsuite
      SECRET_KEY: your-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nbfcsuite-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LOS Service
