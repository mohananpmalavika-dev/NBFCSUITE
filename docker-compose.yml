version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: nbfc-postgres
    environment:
      POSTGRES_DB: nbfc_suite
      POSTGRES_USER: nbfc_admin
      POSTGRES_PASSWORD: nbfc_secure_2026
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nbfc_admin -d nbfc_suite"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nbfc-network

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: nbfc-redis
    command: redis-server --appendonly yes --requirepass nbfc_redis_2026
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nbfc-network

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: nbfc-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: nbfc_admin
      RABBITMQ_DEFAULT_PASS: nbfc_rabbit_2026
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - nbfc-network

  # MinIO Object Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: nbfc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nbfc_admin
      MINIO_ROOT_PASSWORD: nbfc_minio_2026
    ports:
      - "9000:9000"   # API port
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - nbfc-network

  # Elasticsearch (for enterprise search)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: nbfc-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - nbfc-network

  # Kibana (Elasticsearch UI)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: nbfc-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - nbfc-network

  # pgAdmin (PostgreSQL UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nbfc-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nbfcsuite.com
      PGADMIN_DEFAULT_PASSWORD: nbfc_pgadmin_2026
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - nbfc-network

  # Redis Commander (Redis UI)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: nbfc-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379:0:nbfc_redis_2026
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - nbfc-network

networks:
  nbfc-network:
    driver: bridge
    name: nbfc-network

volumes:
  postgres_data:
    name: nbfc-postgres-data
  redis_data:
    name: nbfc-redis-data
  rabbitmq_data:
    name: nbfc-rabbitmq-data
  minio_data:
    name: nbfc-minio-data
  elasticsearch_data:
    name: nbfc-elasticsearch-data
  pgadmin_data:
    name: nbfc-pgadmin-data
