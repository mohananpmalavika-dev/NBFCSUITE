openapi: 3.0.3
info:
  title: LOS Service API
  version: 0.1.0
paths:
  /applications:
    post:
      summary: Create loan application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customer_id: { type: string }
                product_code: { type: string }
                amount: { type: number }
      responses:
        '201':
          description: application created

  /applications/{id}:
    get:
      summary: Get application
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: application

  /applications/{id}/documents:
    post:
      summary: Upload document for application
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: uploaded
