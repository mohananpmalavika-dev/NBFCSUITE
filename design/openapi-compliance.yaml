openapi: 3.0.3
info:
  title: Compliance Service API
  version: 0.1.0
paths:
  /watchlist:
    post:
      summary: Add a watchlist entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                list_type:
                  type: string
                country:
                  type: string
                risk_level:
                  type: string
                  default: medium
                notes:
                  type: string
      responses:
        '200':
          description: watchlist entry created
    get:
      summary: List watchlist entries
      parameters:
        - in: query
          name: list_type
          schema:
            type: string
        - in: query
          name: risk_level
          schema:
            type: string
        - in: query
          name: skip
          schema:
            type: integer
            default: 0
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: watchlist entries list
  /compliance-checks:
    post:
      summary: Add a compliance check result
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customer_id:
                  type: string
                check_type:
                  type: string
                status:
                  type: string
                score:
                  type: number
                details:
                  type: object
      responses:
        '200':
          description: compliance check created
  /compliance-checks/{customer_id}:
    get:
      summary: Get compliance checks for a customer
      parameters:
        - in: path
          name: customer_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: customer compliance checks
  /audit-logs:
    post:
      summary: Create an audit log entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entity_type:
                  type: string
                entity_id:
                  type: string
                action:
                  type: string
                performed_by:
                  type: string
                details:
                  type: object
      responses:
        '200':
          description: audit log created
    get:
      summary: List audit logs
      parameters:
        - in: query
          name: entity_type
          schema:
            type: string
        - in: query
          name: entity_id
          schema:
            type: string
        - in: query
          name: skip
          schema:
            type: integer
            default: 0
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: audit logs list
  /health:
    get:
      summary: Compliance health check
      responses:
        '200':
          description: service healthy
  /ready:
    get:
      summary: Compliance readiness probe
      responses:
        '200':
          description: service ready
  /:
    get:
      summary: Compliance service root
      responses:
        '200':
          description: service metadata
