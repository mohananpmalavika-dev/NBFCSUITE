openapi: 3.0.3
info:
  title: Accounting Service API
  version: 0.1.0
paths:
  /gl-accounts:
    post:
      summary: Create a tenant-scoped general ledger account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GLAccountCreate'
      responses:
        '200':
          description: GL account created
    get:
      summary: List tenant GL accounts
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Tenant GL accounts
  /journal-entries:
    post:
      summary: Create a balanced tenant journal entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JournalEntryCreate'
      responses:
        '200':
          description: Journal entry created
    get:
      summary: List tenant journal entries
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - in: query
          name: skip
          schema:
            type: integer
            default: 0
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Journal entries
  /gl-postings/auto:
    post:
      summary: Create an idempotent automated GL posting from a source event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutomatedGLPostingRequest'
      responses:
        '200':
          description: Existing or newly posted journal entry
  /gl-postings/{journal_entry_id}/reverse:
    post:
      summary: Reverse a tenant journal entry
      parameters:
        - in: path
          name: journal_entry_id
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Reversal journal entry
  /gl-balances:
    get:
      summary: Get tenant GL balances
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Current tenant GL balances
  /reports/trial-balance:
    get:
      summary: Generate a period-aware trial balance
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
      responses:
        '200':
          description: Trial balance by tenant and period
  /reports/profit-loss:
    get:
      summary: Generate a period-aware profit and loss statement
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
      responses:
        '200':
          description: Profit and loss statement
  /reports/balance-sheet:
    get:
      summary: Generate an as-of balance sheet
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - in: query
          name: as_of
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Balance sheet
  /tax-rules:
    post:
      summary: Create tenant tax master data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaxRuleCreate'
      responses:
        '200':
          description: Tax rule created
    get:
      summary: List tenant tax rules
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Tax rules
  /tax/compute:
    post:
      summary: Compute GST/TDS and post corresponding journal lines
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaxComputationRequest'
      responses:
        '200':
          description: Tax computation and posting result
  /bank-transactions:
    post:
      summary: Add a tenant bank statement transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BankTransactionCreate'
      responses:
        '200':
          description: Transaction added
    get:
      summary: List tenant bank transactions
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Bank transactions
  /bank-reconciliation:
    post:
      summary: Reconcile a tenant bank transaction to a journal entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReconciliationRequest'
      responses:
        '200':
          description: Bank transaction reconciled
  /accounting-periods:
    get:
      summary: List tenant accounting periods
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Accounting periods
    post:
      summary: Create an accounting period
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountingPeriodCreate'
      responses:
        '200':
          description: Accounting period created
  /accounting-periods/{period_id}/lock:
    post:
      summary: Lock an accounting period
      parameters:
        - in: path
          name: period_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountingActionRequest'
      responses:
        '200':
          description: Accounting period locked
  /accounting-periods/{period_id}/request-unlock:
    post:
      summary: Request approval to unlock an accounting period
      parameters:
        - in: path
          name: period_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountingActionRequest'
      responses:
        '200':
          description: Unlock request submitted
  /accounting-periods/{period_id}/approve-unlock:
    post:
      summary: Approve an accounting period unlock
      parameters:
        - in: path
          name: period_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountingActionRequest'
      responses:
        '200':
          description: Accounting period reopened
  /posting-rules:
    get:
      summary: List versioned tenant posting rules
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Posting rules
    post:
      summary: Create a draft posting rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostingRuleCreate'
      responses:
        '200':
          description: Draft posting rule created
  /posting-rules/{rule_id}/submit:
    post:
      summary: Submit a draft rule for maker-checker approval
      parameters:
        - $ref: '#/components/parameters/RuleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostingRuleActionRequest'
      responses:
        '200':
          description: Rule submitted
  /posting-rules/{rule_id}/approve:
    post:
      summary: Record checker or finance-head approval
      parameters:
        - $ref: '#/components/parameters/RuleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostingRuleActionRequest'
      responses:
        '200':
          description: Rule approval recorded
  /posting-rules/{rule_id}/publish:
    post:
      summary: Publish a fully approved posting rule
      parameters:
        - $ref: '#/components/parameters/RuleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountingActionRequest'
      responses:
        '200':
          description: Posting rule published
  /posting-rules/{rule_id}/new-version:
    post:
      summary: Create an immutable successor version of a posting rule
      parameters:
        - $ref: '#/components/parameters/RuleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostingRuleVersionRequest'
      responses:
        '200':
          description: New draft version created
  /posting-executions/{execution_id}/rollback:
    post:
      summary: Reverse journal, GL, and subledger effects for an execution
      parameters:
        - in: path
          name: execution_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountingActionRequest'
      responses:
        '200':
          description: Posting execution rolled back
  /health:
    get:
      summary: Accounting health check
      responses:
        '200':
          description: Service healthy
  /ready:
    get:
      summary: Accounting readiness probe
      responses:
        '200':
          description: Service ready
components:
  parameters:
    TenantId:
      in: query
      name: tenant_id
      required: true
      schema:
        type: string
    StartDate:
      in: query
      name: start_date
      schema:
        type: string
        format: date-time
    EndDate:
      in: query
      name: end_date
      schema:
        type: string
        format: date-time
    RuleId:
      in: path
      name: rule_id
      required: true
      schema:
        type: string
  schemas:
    GLAccountCreate:
      type: object
      required: [tenant_id, account_code, account_name, account_type]
      properties:
        tenant_id:
          type: string
        account_code:
          type: string
        account_name:
          type: string
        account_type:
          type: string
          enum: [asset, liability, equity, revenue, expense]
        currency:
          type: string
          default: INR
        base_currency:
          type: string
          default: INR
        normal_balance:
          type: string
          enum: [debit, credit]
        posting_allowed:
          type: string
        allow_manual_posting:
          type: string
        allow_auto_posting:
          type: string
        requires_approval:
          type: string
        freeze_status:
          type: string
          enum: [open, freeze_debit, freeze_credit, freeze_both, closed]
        exchange_gain_loss_account_code:
          type: string
        revaluation_account_code:
          type: string
    JournalLineCreate:
      type: object
      required: [gl_account_id]
      properties:
        gl_account_id:
          type: string
        debit:
          type: number
          default: 0
        credit:
          type: number
          default: 0
        currency:
          type: string
        transaction_currency:
          type: string
        transaction_amount:
          type: number
        exchange_rate:
          type: number
        branch_id:
          type: string
        department_id:
          type: string
        cost_center:
          type: string
        profit_center:
          type: string
        project_id:
          type: string
        employee_id:
          type: string
        product_id:
          type: string
        business_unit_id:
          type: string
        description:
          type: string
    JournalEntryCreate:
      type: object
      required: [tenant_id, description, lines]
      properties:
        tenant_id:
          type: string
        entry_date:
          type: string
          format: date-time
        description:
          type: string
        reference:
          type: string
        metadata:
          type: object
        branch_id:
          type: string
        business_date:
          type: string
          format: date-time
        financial_year:
          type: string
        lines:
          type: array
          items:
            $ref: '#/components/schemas/JournalLineCreate'
    AutomatedGLPostingRequest:
      type: object
      required: [tenant_id, source_module, source_event, source_reference, amount]
      properties:
        tenant_id:
          type: string
        idempotency_key:
          type: string
        source_module:
          type: string
        source_event:
          type: string
        source_reference:
          type: string
        amount:
          type: number
        debit_account_code:
          type: string
        credit_account_code:
          type: string
        metadata:
          type: object
    AccountingPeriodCreate:
      type: object
      required: [tenant_id, financial_year, period_name, period_start, period_end]
      properties:
        tenant_id:
          type: string
        financial_year:
          type: string
        period_name:
          type: string
        period_start:
          type: string
          format: date-time
        period_end:
          type: string
          format: date-time
        branch_id:
          type: string
        performed_by:
          type: string
    AccountingActionRequest:
      type: object
      required: [tenant_id]
      properties:
        tenant_id:
          type: string
        performed_by:
          type: string
        reason:
          type: string
    PostingRuleLine:
      type: object
      required: [account_code, direction]
      properties:
        account_code:
          type: string
        direction:
          type: string
          enum: [debit, credit]
        amount_source:
          type: string
        percentage:
          type: number
        formula:
          type: string
        currency:
          type: string
        dimension_source:
          type: object
          additionalProperties:
            type: string
        transaction_currency_source:
          type: string
        exchange_rate_source:
          type: string
    PostingRuleCreate:
      type: object
      required: [tenant_id, source_module, source_event, lines]
      properties:
        tenant_id:
          type: string
        source_module:
          type: string
        source_event:
          type: string
        rule_name:
          type: string
        priority:
          type: number
        status:
          type: string
          default: draft
        version:
          type: number
          default: 1
        effective_from:
          type: string
          format: date-time
        effective_to:
          type: string
          format: date-time
        requires_approval:
          type: string
          default: 'true'
        dependency_rule_ids:
          type: array
          items:
            type: string
        rollback_strategy:
          type: string
          default: reverse_journal
        lines:
          type: array
          items:
            $ref: '#/components/schemas/PostingRuleLine'
    PostingRuleActionRequest:
      allOf:
        - $ref: '#/components/schemas/AccountingActionRequest'
        - type: object
          properties:
            stage:
              type: string
              enum: [checker, finance_head]
            comment:
              type: string
    PostingRuleVersionRequest:
      type: object
      required: [tenant_id]
      properties:
        tenant_id:
          type: string
        rule_name:
          type: string
        priority:
          type: number
        effective_from:
          type: string
          format: date-time
        effective_to:
          type: string
          format: date-time
        dependency_rule_ids:
          type: array
          items:
            type: string
        lines:
          type: array
          items:
            $ref: '#/components/schemas/PostingRuleLine'
        performed_by:
          type: string
    TaxRuleCreate:
      type: object
      required: [tenant_id, tax_code, tax_type, rate_percent]
      properties:
        tenant_id:
          type: string
        tax_code:
          type: string
        tax_type:
          type: string
          enum: [gst, tds]
        rate_percent:
          type: number
        payable_gl_account_id:
          type: string
        payable_gl_account_code:
          type: string
        expense_gl_account_code:
          type: string
    TaxComputationRequest:
      type: object
      required: [tenant_id, tax_code, source_module, source_reference, taxable_amount]
      properties:
        tenant_id:
          type: string
        tax_code:
          type: string
        source_module:
          type: string
        source_reference:
          type: string
        taxable_amount:
          type: number
    BankTransactionCreate:
      type: object
      required: [tenant_id, reference, transaction_date, amount, description]
      properties:
        tenant_id:
          type: string
        reference:
          type: string
        transaction_date:
          type: string
          format: date-time
        amount:
          type: number
        description:
          type: string
    ReconciliationRequest:
      type: object
      required: [tenant_id, transaction_id, journal_entry_id]
      properties:
        tenant_id:
          type: string
        transaction_id:
          type: string
        journal_entry_id:
          type: string
