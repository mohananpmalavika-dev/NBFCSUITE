openapi: 3.0.3
info:
  title: LMS Service API
  version: 0.1.0
paths:
  /loans:
    post:
      summary: Book a loan (post-approval)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                application_id: { type: string }
                sanctioned_amount: { type: number }
                tenure_months: { type: integer }
                interest_rate: { type: number }
                product_code: { type: string }
      responses:
        '201':
          description: loan booked

  /loans/{id}:
    get:
      summary: Get loan details
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: loan record

  /loans/{id}/schedule:
    get:
      summary: Get amortization schedule
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: array of EMI rows

  /loans/{id}/payment:
    post:
      summary: Record payment / EMI collection
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount: { type: number }
                payment_mode: { type: string, enum: [upi, neft, check] }
      responses:
        '201':
          description: payment recorded

  /loans/{id}/foreclose:
    post:
      summary: Foreclose loan (part/full)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                foreclose_type: { type: string, enum: [partial, full] }
                amount: { type: number }
      responses:
        '201':
          description: foreclosure processed

  /loans/{id}/topup:
    post:
      summary: Top-up loan
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                topup_amount: { type: number }
      responses:
        '201':
          description: top-up applied
