openapi: 3.0.3
info:
  title: Deposits Service API
  version: 0.1.0
paths:
  /deposit-types:
    get:
      summary: List deposit product types
      responses:
        '200':
          description: deposit types list
  /deposit-accounts:
    post:
      summary: Create a deposit account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customer_id:
                  type: string
                deposit_type_code:
                  type: string
                principal_amount:
                  type: number
                start_date:
                  type: string
                  format: date-time
      responses:
        '200':
          description: deposit account created
  /deposit-accounts/{account_id}:
    get:
      summary: Get a deposit account
      parameters:
        - in: path
          name: account_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: deposit account details
  /deposit-accounts/{account_id}/interest-schedule:
    get:
      summary: Get deposit interest schedule
      parameters:
        - in: path
          name: account_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: interest schedule details
  /deposit-accounts/{account_id}/standing-instructions:
    post:
      summary: Add a standing instruction to a deposit account
      parameters:
        - in: path
          name: account_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                instruction_type:
                  type: string
                amount:
                  type: number
                frequency:
                  type: string
                next_run_date:
                  type: string
                  format: date-time
      responses:
        '200':
          description: standing instruction created
    get:
      summary: List standing instructions for a deposit account
      parameters:
        - in: path
          name: account_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: standing instructions list
  /health:
    get:
      summary: Deposits health check
      responses:
        '200':
          description: service healthy
  /ready:
    get:
      summary: Deposits readiness probe
      responses:
        '200':
          description: service ready
