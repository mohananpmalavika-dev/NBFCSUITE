openapi: 3.0.3
info:
  title: Procurement Service API
  version: 0.1.0
paths:
  /vendors:
    post:
      summary: Create a tenant vendor
      responses:
        '200':
          description: Vendor created
    get:
      summary: List tenant vendors
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Vendors
  /purchase-orders:
    post:
      summary: Create a purchase order
      responses:
        '200':
          description: Purchase order created
    get:
      summary: List purchase orders
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Purchase orders
  /purchase-orders/{po_id}/approve:
    post:
      summary: Approve a purchase order
      parameters:
        - $ref: '#/components/parameters/PurchaseOrderId'
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Purchase order approved
  /purchase-orders/{po_id}/goods-receipts:
    post:
      summary: Receive goods against an approved purchase order
      parameters:
        - $ref: '#/components/parameters/PurchaseOrderId'
      responses:
        '200':
          description: Goods receipt created
  /vendor-invoices:
    post:
      summary: Submit a vendor invoice
      responses:
        '200':
          description: Vendor invoice created
    get:
      summary: List vendor invoices
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Vendor invoices
  /vendor-invoices/{invoice_id}/mark-paid:
    post:
      summary: Mark a vendor invoice paid
      parameters:
        - in: path
          name: invoice_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Vendor invoice paid
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Healthy
components:
  parameters:
    TenantId:
      in: query
      name: tenant_id
      required: true
      schema:
        type: string
    PurchaseOrderId:
      in: path
      name: po_id
      required: true
      schema:
        type: string
