openapi: 3.0.3
info:
  title: Document Service API
  version: 0.1.0
paths:
  /documents:
    post:
      summary: Upload or register a document record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                subject_type:
                  type: string
                subject_id:
                  type: string
                document_type:
                  type: string
                document_name:
                  type: string
                document_url:
                  type: string
                expiry_date:
                  type: string
                  format: date-time
                metadata:
                  type: object
      responses:
        '200':
          description: document record created
    get:
      summary: List documents
      parameters:
        - in: query
          name: subject_type
          schema:
            type: string
        - in: query
          name: subject_id
          schema:
            type: string
        - in: query
          name: document_type
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: skip
          schema:
            type: integer
            default: 0
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: document records list
  /documents/{document_id}:
    get:
      summary: Get a document record
      parameters:
        - in: path
          name: document_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: document record
    put:
      summary: Update a document record
      parameters:
        - in: path
          name: document_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                document_name:
                  type: string
                document_url:
                  type: string
                version:
                  type: string
                status:
                  type: string
                expiry_date:
                  type: string
                  format: date-time
                metadata:
                  type: object
      responses:
        '200':
          description: document record updated
  /health:
    get:
      summary: Document health check
      responses:
        '200':
          description: service healthy
  /ready:
    get:
      summary: Document readiness probe
      responses:
        '200':
          description: service ready
  /:
    get:
      summary: Document service root
      responses:
        '200':
          description: service metadata
