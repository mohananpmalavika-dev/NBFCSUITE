openapi: 3.0.3
info:
  title: HRMS Service API
  version: 0.1.0
paths:
  /employees:
    post:
      summary: Create employee master record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employee_number, first_name, last_name, email, phone, designation, department]
              properties:
                employee_number: { type: string }
                first_name: { type: string }
                last_name: { type: string }
                email: { type: string }
                tenant_id: { type: string, default: default }
                phone: { type: string }
                designation: { type: string }
                department: { type: string }
                branch_id: { type: string }
                user_id: { type: string }
                employment_type: { type: string }
                joining_date: { type: string, format: date-time }
      responses:
        '200':
          description: employee created
    get:
      summary: List employees by branch, department, or status
      parameters:
        - in: query
          name: branch_id
          schema: { type: string }
        - in: query
          name: department
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
      responses:
        '200':
          description: employee list
  /employees/{employee_id}:
    get:
      summary: Get employee
      parameters:
        - in: path
          name: employee_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: employee details
    put:
      summary: Update employee
      parameters:
        - in: path
          name: employee_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: employee updated
  /employees/{employee_id}/assign-branch:
    post:
      summary: Assign employee to a branch
      parameters:
        - in: path
          name: employee_id
          required: true
          schema: { type: string }
        - in: query
          name: branch_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: employee branch assignment updated
  /payroll/runs:
    post:
      summary: Create a tenant payroll run
      responses:
        '200':
          description: payroll run created
    get:
      summary: List tenant payroll runs
      parameters:
        - in: query
          name: tenant_id
          required: true
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
      responses:
        '200':
          description: payroll runs
  /payroll/runs/{run_id}/slips:
    post:
      summary: Add an employee payslip to a payroll run
      parameters:
        - in: path
          name: run_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: payslip created
    get:
      summary: List payslips in a payroll run
      parameters:
        - in: path
          name: run_id
          required: true
          schema: { type: string }
        - in: query
          name: tenant_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: payslips
  /payroll/runs/{run_id}/finalize:
    post:
      summary: Finalize a payroll run
      parameters:
        - in: path
          name: run_id
          required: true
          schema: { type: string }
        - in: query
          name: tenant_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: payroll run finalized
  /payroll/summary:
    get:
      summary: Summarize payroll by tenant and period
      parameters:
        - in: query
          name: tenant_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: payroll summary
  /health:
    get:
      summary: HRMS health check
      responses:
        '200':
          description: service healthy
  /ready:
    get:
      summary: HRMS readiness probe
      responses:
        '200':
          description: service ready
