apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nbfcsuite-ingress
  namespace: nbfcsuite
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.nbfcsuite.com
    - nbfcsuite.com
    secretName: nbfcsuite-tls
  rules:
  - host: nbfcsuite.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-app
            port:
              number: 3000
  - host: api.nbfcsuite.com
    http:
      paths:
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 8000
      - path: /los
        pathType: Prefix
        backend:
          service:
            name: los-service
            port:
              number: 8000
      - path: /lms
        pathType: Prefix
        backend:
          service:
            name: lms-service
            port:
              number: 8000
      - path: /collections
        pathType: Prefix
        backend:
          service:
            name: collections-service
            port:
              number: 8000
      - path: /customers
        pathType: Prefix
        backend:
          service:
            name: customer-service
            port:
              number: 8000
      - path: /findna
        pathType: Prefix
        backend:
          service:
            name: findna-service
            port:
              number: 8000

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@nbfcsuite.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: auth-service-pdb
  namespace: nbfcsuite
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: auth-service

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: los-service-pdb
  namespace: nbfcsuite
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: los-service

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: lms-service-pdb
  namespace: nbfcsuite
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: lms-service

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: collections-service-pdb
  namespace: nbfcsuite
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: collections-service

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: customer-service-pdb
  namespace: nbfcsuite
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: customer-service

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: findna-service-pdb
  namespace: nbfcsuite
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: findna-service

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: web-app-pdb
  namespace: nbfcsuite
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: web-app

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nbfcsuite-services
  namespace: nbfcsuite
spec:
  selector:
    matchLabels:
      monitoring: "true"
  endpoints:
  - port: http
    interval: 30s
