apiVersion: v1
kind: Namespace
metadata:
  name: nbfcsuite

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nbfcsuite-config
  namespace: nbfcsuite
data:
  DATABASE_URL: "postgresql://nbfc_user:nbfc_pass@postgres:5432/nbfcsuite"
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"

---
apiVersion: v1
kind: Secret
metadata:
  name: nbfcsuite-secrets
  namespace: nbfcsuite
type: Opaque
stringData:
  SECRET_KEY: "your-production-secret-key-change-this"
  POSTGRES_PASSWORD: "nbfc_pass"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: nbfcsuite
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: nbfcsuite
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "nbfc_user"
        - name: POSTGRES_DB
          value: "nbfcsuite"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nbfcsuite-secrets
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U nbfc_user
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: nbfcsuite
spec:
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgres
