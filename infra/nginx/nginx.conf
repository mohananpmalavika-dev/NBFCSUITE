}

upstream collections_backend {
    server collections-service:8000;
}

upstream customer_backend {
    server customer-service:8000;
}

upstream findna_backend {
    server findna-service:8000;
}

upstream deposits_backend {
    server deposits-service:8000;
}

upstream accounting_backend {
    server accounting-service:8000;
}

upstream crm_backend {
    server crm-service:8000;
}

upstream document_backend {
