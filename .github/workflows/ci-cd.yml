name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io

jobs:
  # Backend Services Testing
  backend-test:
    runs-on: ubuntu-latest
    name: Backend Tests

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: nbfc_user
          POSTGRES_PASSWORD: nbfc_pass
          POSTGRES_DB: nbfcsuite
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://nbfc_user:nbfc_pass@localhost:5432/nbfcsuite
        run: |
          psql -h localhost -U nbfc_user -d nbfcsuite -f infra/migrations/001_create_auth_tables.sql
          psql -h localhost -U nbfc_user -d nbfcsuite -f infra/migrations/002_create_customer_tables.sql
          psql -h localhost -U nbfc_user -d nbfcsuite -f infra/migrations/003_create_los_tables.sql
          psql -h localhost -U nbfc_user -d nbfcsuite -f infra/migrations/004_create_lms_tables.sql
          psql -h localhost -U nbfc_user -d nbfcsuite -f infra/migrations/005_create_collections_tables.sql
          psql -h localhost -U nbfc_user -d nbfcsuite -f infra/migrations/006_seed_data.sql
          psql -h localhost -U nbfc_user -d nbfcsuite -f infra/migrations/007_create_findna_tables.sql
          psql -h localhost -U nbfc_user -d nbfcsuite -f infra/migrations/008_create_crm_tables.sql
          psql -h localhost -U nbfc_user -d nbfcsuite -f infra/migrations/009_create_accounting_tables.sql
          psql -h localhost -U nbfc_user -d nbfcsuite -f infra/migrations/010_create_deposits_tables.sql
          psql -h localhost -U nbfc_user -d nbfcsuite -f infra/migrations/011_create_document_tables.sql
          psql -h localhost -U nbfc_user -d nbfcsuite -f infra/migrations/012_create_compliance_tables.sql

      - name: Install Auth Service dependencies
        run: |
          cd services/auth
          pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run Auth Service tests
        env:
          DATABASE_URL: postgresql://nbfc_user:nbfc_pass@localhost:5432/nbfcsuite
        run: |
          cd services/auth
          pytest || true

      - name: Install LOS Service dependencies
        run: |
          cd services/los
          pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run LOS Service tests
        env:
          DATABASE_URL: postgresql://nbfc_user:nbfc_pass@localhost:5432/nbfcsuite
        run: |
          cd services/los
          pytest || true

      - name: Install LMS Service dependencies
        run: |
          cd services/lms
          pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run LMS Service tests
        env:
          DATABASE_URL: postgresql://nbfc_user:nbfc_pass@localhost:5432/nbfcsuite
        run: |
          cd services/lms
          pytest || true

      - name: Install Collections Service dependencies
        run: |
          cd services/collections
          pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run Collections Service tests
        env:
          DATABASE_URL: postgresql://nbfc_user:nbfc_pass@localhost:5432/nbfcsuite
        run: |
          cd services/collections
          pytest || true

      - name: Install Customer Service dependencies
        run: |
          cd services/customer
          pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run Customer Service tests
        env:
          DATABASE_URL: postgresql://nbfc_user:nbfc_pass@localhost:5432/nbfcsuite
        run: |
          cd services/customer
          pytest || true

      - name: Install FinDNA Service dependencies
        run: |
          cd services/findna
          pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run FinDNA Service tests
        env:
          DATABASE_URL: postgresql://nbfc_user:nbfc_pass@localhost:5432/nbfcsuite
        run: |
          cd services/findna
          pytest || true

      - name: Install Deposit Service dependencies
        run: |
          cd services/deposits
          pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run Deposit Service tests
        env:
          DATABASE_URL: postgresql://nbfc_user:nbfc_pass@localhost:5432/nbfcsuite
        run: |
          cd services/deposits
          pytest || true

      - name: Install Accounting Service dependencies
        run: |
          cd services/accounting
          pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run Accounting Service tests
        env:
          DATABASE_URL: postgresql://nbfc_user:nbfc_pass@localhost:5432/nbfcsuite
        run: |
          cd services/accounting
          pytest || true

      - name: Install CRM Service dependencies
        run: |
          cd services/crm
          pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run CRM Service tests
        env:
          DATABASE_URL: postgresql://nbfc_user:nbfc_pass@localhost:5432/nbfcsuite
        run: |
          cd services/crm
          pytest || true

      - name: Install Document Service dependencies
        run: |
          cd services/document
          pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run Document Service tests
        env:
          DATABASE_URL: postgresql://nbfc_user:nbfc_pass@localhost:5432/nbfcsuite
        run: |
          cd services/document
          pytest || true

      - name: Install Compliance Service dependencies
        run: |
          cd services/compliance
          pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run Compliance Service tests
        env:
          DATABASE_URL: postgresql://nbfc_user:nbfc_pass@localhost:5432/nbfcsuite
        run: |
          cd services/compliance
          pytest || true

  # Frontend Testing
  frontend-test:
    runs-on: ubuntu-latest
    name: Frontend Tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'apps/customer-app/package-lock.json'

      - name: Install dependencies
        run: |
          cd apps/customer-app
          npm ci

      - name: Lint TypeScript
        run: |
          cd apps/customer-app
          npm run lint || true

      - name: Build Next.js
        run: |
          cd apps/customer-app
          npm run build

      - name: Run frontend tests
        run: |
          cd apps/customer-app
          npm run test || true

  # Docker Build & Push
  docker-build:
    runs-on: ubuntu-latest
    name: Docker Build
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - auth
          - los
          - lms
          - collections
          - customer
          - findna
          - deposits
          - accounting
          - crm
          - document
          - compliance

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }} service
        uses: docker/build-push-action@v4
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/nbfcsuite-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/nbfcsuite-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build and Push Frontend
  frontend-docker-build:
    runs-on: ubuntu-latest
    name: Frontend Docker Build
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web app
        uses: docker/build-push-action@v4
        with:
          context: ./apps/customer-app
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/nbfcsuite-web:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/nbfcsuite-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Integration Tests
  integration-test:
    runs-on: ubuntu-latest
    name: Integration Tests
    needs: [backend-test, frontend-test]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: nbfc_user
          POSTGRES_PASSWORD: nbfc_pass
          POSTGRES_DB: nbfcsuite
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio httpx

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://nbfc_user:nbfc_pass@localhost:5432/nbfcsuite
        run: |
          psql -h localhost -U nbfc_user -d nbfcsuite -f infra/migrations/001_create_auth_tables.sql
          psql -h localhost -U nbfc_user -d nbfcsuite -f infra/migrations/002_create_customer_tables.sql
          psql -h localhost -U nbfc_user -d nbfcsuite -f infra/migrations/003_create_los_tables.sql
          psql -h localhost -U nbfc_user -d nbfcsuite -f infra/migrations/004_create_lms_tables.sql
          psql -h localhost -U nbfc_user -d nbfcsuite -f infra/migrations/005_create_collections_tables.sql
          psql -h localhost -U nbfc_user -d nbfcsuite -f infra/migrations/006_seed_data.sql

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://nbfc_user:nbfc_pass@localhost:5432/nbfcsuite
        run: |
          pytest tests/integration/ -v || true

  # Deployment (Optional)
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Staging
    needs: [docker-build, frontend-docker-build, integration-test]
    if: github.ref == 'refs/heads/develop'
    # Add your deployment steps here for staging environment
    steps:
      - name: Deploy notification
        run: |
          echo "Deployment to staging would happen here"
          echo "Configure with your deployment tool (kubectl, terraform, etc.)"
