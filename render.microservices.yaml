# ============================================
# COST ANALYSIS (Free Tier)
# ============================================
#
# Render Free Tier includes:
# - 750 hours/month of free services (multiple services share this pool)
# - Each service gets 512MB RAM
# - Services sleep after 15 mins of inactivity
# - 90 second spin-up time (cold start)
#
# With 4 services:
# - Total: 4 × 512MB = 2GB RAM (vs 512MB monolith)
# - Hours: 750 hours shared across 4 services
# - Approximately 185 hours per service per month
# - Or ~6 hours per day per service
#
# For production 24/7 uptime:
# - Upgrade to Starter plan: $7/month per service
# - Total: 4 × $7 = $28/month
# - Database: $7/month (shared)
# - Grand Total: $35/month for complete system
#
# ============================================
